<!DOCTYPE html>
<html>
<body>
  <h1>Coffee Finder</h1>
  
  <input type="text" id="userPrompt" placeholder="e.g., quiet cafe with Wi-Fi">
  <button id="findBtn">Find Coffee</button>
  
  <div id="result" style="margin-top: 20px;"></div>

  <script>
    document.getElementById('findBtn').addEventListener('click', async () => {
      const userPrompt = document.getElementById('userPrompt').value;
      const resultDiv = document.getElementById('result');
      
      resultDiv.innerText = "Searching...";

      navigator.geolocation.getCurrentPosition(async (position) => {
        const { latitude, longitude } = position.coords;

        const response = await fetch('/.netlify/functions/get-coffee', {
          method: 'POST',
          body: JSON.stringify({ 
            lat: latitude, 
            lng: longitude, 
            userPrompt: userPrompt 
          })
        });

        const data = await response.json();
        resultDiv.innerText = data.result || "Error: " + data.error;
      }, (err) => {
        resultDiv.innerText = "Error: Please enable location access.";
      });
    });
  </script>
</body>
</html>
