<!DOCTYPE html>
<html>
<head>
  <title>Netlify AI Chat</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
    }

    #chat {
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
    }

    .user { color: blue; margin: 5px 0; }
    .ai { color: green; margin: 5px 0; }
  </style>
</head>
<body>

<h2>AI Chat</h2>

<div id="chat"></div>

<input id="input" style="width:80%" placeholder="Type..." />
<button onclick="send()">Send</button>

<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const msg = input.value;
  if (!msg) return;

  chat.innerHTML += `<div class="user">You: ${msg}</div>`;
  input.value = "";

  const res = await fetch("/.netlify/functions/chat", {
    method: "POST",
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  chat.innerHTML += `<div class="ai">AI: ${data.reply}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
