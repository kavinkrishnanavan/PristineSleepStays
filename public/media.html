  <style>
    :root {
      color-scheme: light;
      --ink: #18201a;
      --muted: #657165;
      --green: #01639f;
      --green-dark: #0215a3;
      --blue: #1cb0f6;
      --panel: #ffffff;
      --line: #d8e4d5;
    }
    body {
      font-family: 'Nunito', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #f7fbf2 !important;
      color: var(--ink) !important;
    }
    /* Smooth custom scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f0f7eb;
    }
    ::-webkit-scrollbar-thumb {
      background: #c8d8c1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #adc6a2;
    }
    /* Pulsing animation for active probe */
    @keyframes sonar-pulse {
      0% { transform: scale(0.9); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .probe-sonar {
      position: relative;
    }
    .probe-sonar::after {
      content: '';
      position: absolute;
      top: -12px;
      left: -12px;
      width: 36px;
      height: 36px;
      border: 3px solid #f43f5e;
      border-radius: 50%;
      animation: sonar-pulse 1.8s infinite ease-out;
      pointer-events: none;
    }
    body,
    aside,
    header,
    main,
    section,
    div {
      border-color: var(--line) !important;
    }
    .bg-slate-950,
    .bg-slate-800,
    .bg-slate-900,
    .bg-slate-900\/30,
    .bg-slate-900\/40,
    .bg-slate-900\/50,
    .bg-slate-950\/40,
    .bg-slate-950\/60 {
      background-color: var(--panel) !important;
    }
    .bg-slate-800 {
      background-color: #eef8ea !important;
    }
    .text-white,
    .text-slate-100,
    .text-slate-200,
    .text-slate-300 {
      color: var(--ink) !important;
    }
    .text-slate-400,
    .text-slate-500,
    .text-slate-600 {
      color: var(--muted) !important;
    }
    .shadow-2xl {
      box-shadow: 0 10px 26px rgba(31, 84, 28, 0.12) !important;
    }
    input,
    select {
      background: #fff !important;
      color: var(--ink) !important;
      border: 2px solid var(--line) !important;
      border-radius: 12px !important;
      font-size: 15px !important;
      font-weight: 800 !important;
      min-height: 44px;
    }
    input:focus,
    select:focus {
      border-color: var(--blue) !important;
      box-shadow: 0 0 0 4px rgba(28, 176, 246, 0.16) !important;
    }
    #searchBtn,
    a {
  display: flex;
  align-items: center;
  justify-content: center;

  background: var(--green) !important;
  border: 0 !important;
  border-bottom: 5px solid var(--green-dark) !important;
  border-radius: 14px !important;
  color: white !important;
  font-size: 14px !important;
  font-weight: 900 !important;
  min-height: 44px;
  padding: 0 18px !important;
  text-transform: uppercase;
  text-decoration: none; /* removes underline */
}
    #searchBtn:hover,
    a:hover {
      background: #0186d8 !important;
    }
    #searchBtn:active,
    a:active {
      transform: translateY(4px);
      border-bottom-width: 1px !important;
    }
    #resetMapBtn {
      color: var(--blue) !important;
      background: #eaf7ff !important;
      border-radius: 999px;
      height: 34px;
      width: 34px;
    }
    #map {
      background: #eef7e7 !important;
    }
    #probeCoords {
      display: none;
    }
    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: #ffffff !important;
      color: var(--ink) !important;
      border-radius: 14px !important;
    }
    .leaflet-control-zoom a {
      color: var(--ink) !important;
    }
    .simple-card {
      background: #ffffff;
      border: 2px solid var(--line);
      border-radius: 16px;
    }
    
    
  </style>
